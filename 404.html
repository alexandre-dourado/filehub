<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — FileHub</title>
  <style>
    :root { --accent: #7c3aed; --accent-lt: #a78bfa; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d0d14;
      color: #eeeef4;
      font-family: ui-monospace, monospace;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .wrap { max-width: 400px; }
    .code { font-size: 5rem; font-weight: 800; color: var(--accent-lt); letter-spacing: -.05em; line-height: 1; margin-bottom: 1rem; }
    h1 { font-size: 1rem; color: #8888a8; margin-bottom: 1.5rem; font-weight: 400; }
    a {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: .6rem 1.4rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      transition: opacity .18s;
    }
    a:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Página não encontrada.</h1>
    <a href="/">← Voltar ao Hub</a>
  </div>
</body>
</html>
