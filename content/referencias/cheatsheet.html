<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Referência HTML</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 2rem; }
    h1 { color: #7c3aed; }
    code { background: #2d2d4e; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Cheatsheet HTML</h1>
  <p>Arquivo HTML renderizado via <code>iframe</code> no viewer interno.</p>
  <ul>
    <li><code>&lt;div&gt;</code> — Container genérico</li>
    <li><code>&lt;section&gt;</code> — Seção semântica</li>
    <li><code>&lt;article&gt;</code> — Conteúdo independente</li>
  </ul>
</body>
</html>
