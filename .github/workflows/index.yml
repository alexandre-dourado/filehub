name: Gerar Índice Automaticamente

on:
  push:
    paths:
      - 'content/**'

jobs:
  generate-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar index.json
        run: node scripts/generate-index.js

      - name: Commitar índice atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.json
          git diff --staged --quiet && echo "Sem mudanças no índice." || \
            git commit -m "chore: atualizar index.json automaticamente [skip ci]"
          git push
